name: ci

on:
  push:
    branches: [main]
    # Tag pushes (v1.2.3) also build + publish, then the release job below
    # creates a GitHub Release with the matrix artifacts attached, so the
    # in-app self-update checker can point users at a real download.
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    # Tests target plain net8.0 with no WinUI deps, so we run them on ubuntu for speed.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore Tests/RoboCopyGUI.Tests.csproj
      - name: Test
        run: dotnet test Tests/RoboCopyGUI.Tests.csproj --configuration Release --no-restore --verbosity normal

  build-and-publish:
    name: Build & publish ${{ matrix.rid }}
    needs: test
    # WinUI 3 unpackaged + WindowsAppSDK requires a Windows builder.
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-arm64
            platform: ARM64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore RoboCopyGUI.csproj
      - name: Publish
        shell: pwsh
        # Pin PublishDir so the artifact path is deterministic regardless of how
        # MSBuild lays out bin\<Platform>\... per RID. Also explicitly point at
        # the matching publish profile (the csproj resolves
        # PublishProfile=win-$(Platform).pubxml which is case-sensitive on the
        # GHA Linux side of MSBuild — supply the file path directly to avoid
        # NETSDK1198 when Platform=ARM64).
        run: |
          dotnet publish RoboCopyGUI.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            -p:Platform=${{ matrix.platform }} `
            -p:PublishProfile=Properties/PublishProfiles/${{ matrix.rid }}.pubxml `
            -p:PublishDir=artifacts/${{ matrix.rid }}/ `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            -p:EnableMsixTooling=true
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: RoboCopyGUI-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Release job: only runs on tag pushes (e.g. `git tag v1.2.3 && git
  # push --tags`). Downloads the matrix artifacts that build-and-publish
  # just uploaded, zips each RID's publish folder, and creates / updates
  # the GitHub Release at that tag with both .zip files attached so the
  # in-app self-update InfoBar can link users straight at a real download.
  # ------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build-and-publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write    # required for softprops/action-gh-release
    steps:
      - uses: actions/checkout@v6
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Zip each RID's publish folder
        # Each artifact is a folder under artifacts/<artifact-name>/.
        # We zip them with their RID-tagged tag name so the asset filename
        # is self-describing on the Releases page.
        run: |
          set -euxo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          mkdir -p release-assets
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            # Strip the "RoboCopyGUI-" prefix so the zip is "RoboCopyGUI-v1.2.3-win-x64.zip".
            rid="${name#RoboCopyGUI-}"
            out="../release-assets/RoboCopyGUI-${TAG_NAME}-${rid}.zip"
            (cd "$name" && zip -r "$out" .)
          done
          ls -la ../release-assets
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
          # If the tag name contains "-rc"/"-beta"/etc. mark it prerelease so
          # the in-app /releases/latest check (which only returns stable
          # releases) skips it automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true

